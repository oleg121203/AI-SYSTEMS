services:
  ai-systems:
    build: .
    container_name: ai-systems
    network_mode: host
    env_file:
      - /home/dev/vscode/AI-SYSTEMS/.env
    environment:
      - WEB_PORT=7860
      - DOCKER_ENV=true
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./repo:/app/repo
      - ~/.ssh:/home/vscode/.ssh:ro
    restart: on-failure
    command: bash -c "bash /app/run_async_services.sh"
